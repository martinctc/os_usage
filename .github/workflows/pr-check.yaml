name: PR check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: LATEST

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2

      - name: Validate existing snapshots
        run: Rscript scripts/validate_snapshots.R

      - name: Render readme.qmd (no commit)
        env:
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}
        run: quarto render readme.qmd --to gfm --output /tmp/README.preview.md

      - name: Render os_usage.qmd (no commit)
        env:
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}
        run: quarto render os_usage.qmd --to html --output /tmp/os_usage.preview.html

      - name: Validate snapshots produced during render
        run: Rscript scripts/validate_snapshots.R
