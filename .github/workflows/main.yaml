name: Render README

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 1,15 * *'  # Runs at midnight on the 1st and 15th of every month
    
jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: LATEST

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2

      - name: Render Quarto document
        env:
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}
        run: |
          quarto render readme.qmd --to gfm --output README.md

      - name: Render os_usage.qmd as static HTML
        env:
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}
        run: |
          quarto render os_usage.qmd --to html --output os_usage.html

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md os_usage.html data/
          git diff-index --quiet HEAD || git commit -m "chore: update download snapshots and rendered report"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
        
